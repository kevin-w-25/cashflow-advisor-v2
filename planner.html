<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>现金流规划助手 · 分析报告</title>
<link rel="stylesheet" href="assets/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <div class="nav-logo">💎</div>
    <span class="nav-title">现金流规划助手</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" data-page="index" href="index.html">🏠 首页</a>
    <a class="nav-link" data-page="clients" href="clients.html">📋 客户档案</a>
    <a class="nav-link" data-page="comparison" href="comparison.html">📈 历史对比</a>
    <a class="nav-link active" data-page="planner" href="planner.html">📊 开始分析</a>
    <a class="nav-link" data-page="monthly" href="monthly.html">📅 月度对账</a>
    <a class="nav-link" data-page="scenarios" href="scenarios.html">🔮 场景模拟</a>
  </div>
</nav>

<div class="main" style="max-width:960px">

  <!-- 步骤指示器 -->
  <div class="phases" id="phases">
    <div class="phase active" data-step="1" onclick="goStepNav(1)"><span class="pn">1</span>基本信息</div>
    <div class="phase" data-step="2" onclick="goStepNav(2)"><span class="pn">2</span>收支数据</div>
    <div class="phase" data-step="3" onclick="goStepNav(3)"><span class="pn">3</span>分析报告</div>
  </div>

  <!-- ═══════ STEP 1: 基本信息 ═══════ -->
  <div id="step1" class="step-panel">
    <div class="page-header">
      <div class="page-title">第一步：基本信息</div>
      <div class="page-sub">请填写您的基本信息，帮助我们为您量身定制分析</div>
    </div>

    <div class="card gb" style="margin-bottom:20px">
      <div class="card-title"><span class="ico">👤</span> 个人信息</div>
      <div class="frow">
        <div class="fg"><label>姓名 *</label><input type="text" id="s-name" placeholder="请输入您的姓名"/></div>
        <div class="fg"><label>年龄 *</label><input type="number" id="s-age" placeholder="如：45" min="18" max="100"/></div>
      </div>
      <div class="frow">
        <div class="fg"><label>预计退休年龄</label><input type="number" id="s-retire" placeholder="60" value="60" min="40" max="80"/></div>
        <div class="fg">
          <label>风险偏好</label>
          <select id="s-risk">
            <option value="conservative">保守型</option>
            <option value="moderate" selected>稳健型</option>
            <option value="growth">成长型</option>
            <option value="aggressive">激进型</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label>主要货币</label>
          <select id="s-currency">
            <option value="USD">美元 (USD)</option>
            <option value="HKD">港币 (HKD)</option>
            <option value="CNY">人民币 (CNY)</option>
            <option value="SGD">新加坡元 (SGD)</option>
          </select>
        </div>
        <div class="fg"><label>紧急预备金目标（月）</label><input type="number" id="s-emonths" value="6" min="3" max="24"/></div>
      </div>
    </div>

    <div class="card gb" style="margin-bottom:20px">
      <div class="card-title"><span class="ico">🏠</span> 资产情况</div>
      <div class="frow">
        <div class="fg"><label>流动现金</label><div class="unit"><input type="number" id="s-cash" placeholder="0"/><span class="uf">月</span></div></div>
        <div class="fg"><label>储蓄保险 / 年金</label><div class="unit"><input type="number" id="s-savings-plan" placeholder="0"/><span class="uf">总额</span></div></div>
      </div>
      <div class="frow">
        <div class="fg"><label>信托资产</label><div class="unit"><input type="number" id="s-trust" placeholder="0"/><span class="uf">总额</span></div></div>
        <div class="fg"><label>投资性房产</label><div class="unit"><input type="number" id="s-property" placeholder="0"/><span class="uf">市值</span></div></div>
      </div>
      <div class="frow">
        <div class="fg"><label>股票 / 基金</label><div class="unit"><input type="number" id="s-stocks" placeholder="0"/><span class="uf">市值</span></div></div>
        <div class="fg"><label>黄金 / 其他</label><div class="unit"><input type="number" id="s-gold" placeholder="0"/><span class="uf">市值</span></div></div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-ghost" style="margin-right:10px" onclick="saveCurrentData()">💾 保存</button>
      <button class="btn btn-gold" onclick="goStep(2)">下一步：收支数据 →</button>
    </div>
  </div>

  <!-- ═══════ STEP 2: 收支数据 ═══════ -->
  <div id="step2" class="step-panel" style="display:none">
    <div class="page-header">
      <div class="page-title">第二步：收支数据</div>
      <div class="page-sub">请填写您的月度收入与支出明细</div>
    </div>

    <div class="card gb" style="margin-bottom:20px">
      <div class="card-title"><span class="ico">💰</span> 月度收入 <span style="font-size:11px;color:var(--text2);font-weight:400;margin-left:8px">💡 建议填写税后实际到账金额</span></div>
      <div class="frow">
        <div class="fg"><label>主动收入（工资/薪金）</label><div class="unit"><input type="number" id="s-active" placeholder="0" oninput="checkIncome(this)"/><span class="uf">/月</span></div></div>
        <div class="fg"><label>被动收入（租金/分红/利息）</label><div class="unit"><input type="number" id="s-passive" placeholder="0" oninput="checkPassive(this)"/><span class="uf">/月</span></div></div>
      </div>
    </div>

    <div class="card gb" style="margin-bottom:20px">
      <div class="card-title"><span class="ico">💸</span> 月度支出</div>
      <div class="frow">
        <div class="fg"><label>刚性支出（房租/房贷/保险/水电）</label><div class="unit"><input type="number" id="s-essential" placeholder="0"/><span class="uf">/月</span></div></div>
        <div class="fg"><label>弹性支出（餐饮/交通/娱乐）</label><div class="unit"><input type="number" id="s-flex" placeholder="0"/><span class="uf">/月</span></div></div>
      </div>
      <div class="frow">
        <div class="fg"><label>保障性支出（人寿/医疗/重疾险）</label><div class="unit"><input type="number" id="s-premium" placeholder="0"/><span class="uf">/月</span></div></div>
        <div class="fg"><label>债务还款（房贷/车贷/信用卡）</label><div class="unit"><input type="number" id="s-debt" placeholder="0"/><span class="uf">/月</span></div></div>
      </div>
    </div>

    <div class="card gb" style="margin-bottom:20px">
      <div class="card-title"><span class="ico">🎯</span> 目标规划（选填）</div>
      <div class="frow">
        <div class="fg"><label>退休后期望月度支出</label><div class="unit"><input type="number" id="s-retire-need" placeholder="0"/><span class="uf">/月</span></div></div>
        <div class="fg"><label>子女教育储备目标</label><div class="unit"><input type="number" id="s-edu-goal" placeholder="0"/><span class="uf">总额</span></div></div>
      </div>
      <div class="frow">
        <div class="fg"><label>教育储备年限</label><input type="number" id="s-edu-years" placeholder="8" value="8" min="1" max="25"/></div>
        <div class="fg">
          <label>财富传承意愿</label>
          <select id="s-legacy">
            <option value="none">暂无特别规划</option>
            <option value="trust">已设立 / 计划设立信托</option>
            <option value="full">全面传承规划</option>
          </select>
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between">
      <button class="btn btn-ghost" onclick="goStep(1)">← 上一步</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="saveCurrentData()">💾 保存</button>
        <button class="btn btn-gold" onclick="generateReport()">生成分析报告 →</button>
      </div>
    </div>
  </div>

  <!-- ═══════ STEP 3: 分析报告 ═══════ -->
  <div id="step3" class="step-panel" style="display:none">
    <div id="report-content">
      <!-- 动态生成 -->
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:24px;border-top:1px solid var(--border2)">
      <button class="btn btn-ghost" onclick="goStep(2)">← 修改数据</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="location.href='planner.html'">新建分析</button>
        <button class="btn btn-gold" onclick="downloadPDF()">📄 下载 PDF 报告</button>
      </div>
    </div>
  </div>

</div>

<script src="assets/app.js"></script>
<script src="assets/storage.js"></script>
<script>
initNav('planner');

// ── 当前分析数据（内存中，可持久化） ──
let reportData = null;
let currentClientId = null;

// ── 页面加载时检查是否有选中的客户 ─────────────────
document.addEventListener('DOMContentLoaded', () => {
  const selectedClientId = sessionStorage.getItem('selectedClientId');
  if (selectedClientId) {
    loadClientToForm(selectedClientId);
    sessionStorage.removeItem('selectedClientId');
  }
});

// ── 步骤导航 ──
function goStep(n) {
  console.log('goStep called with n=' + n);
  if (n === 2 && !validateStep1()) return;
  if (n === 3 && reportData === null) {
    toast('请先生成分析报告', 'warn');
    return;
  }

  document.querySelectorAll('.step-panel').forEach(p => p.style.display = 'none');
  document.getElementById('step' + n).style.display = 'block';
  document.querySelectorAll('.phase').forEach(p => {
    const s = parseInt(p.dataset.step);
    p.classList.toggle('active', s === n);
    p.querySelector('.pn').classList.toggle('filled', s < n);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 步骤指示器点击导航 ──
function goStepNav(n) {
  // 始终允许跳转到已完成的步骤或当前步骤
  // 跳转到未来步骤时需要验证
  const currentStep = document.querySelector('.phase.active')?.dataset.step || 1;
  const targetStep = parseInt(n);

  if (targetStep <= currentStep) {
    // 允许返回到已完成的步骤
    goStep(targetStep);
  } else {
    // 跳转到未来步骤，需要按顺序验证
    let valid = true;
    for (let i = parseInt(currentStep) + 1; i <= targetStep; i++) {
      if (i === 2 && !validateStep1()) {
        valid = false;
        break;
      }
    }
    if (valid) {
      goStep(targetStep);
    }
  }
}

function validateStep1() {
  const name = v('s-name').trim();
  const age = parseInt(v('s-age'));
  console.log('validateStep1:', { name, age, sNameValue: document.getElementById('s-name')?.value });
  if (!name) { toast('请输入姓名', 'error'); return false; }
  if (!age || age < 18 || age > 100) { toast('请输入有效年龄（18-100）', 'error'); return false; }
  return true;
}

function validateStep2() {
  const totalIncome = g('s-active') + g('s-passive');
  const totalExp = g('s-essential') + g('s-flex') + g('s-premium') + g('s-debt');
  if (totalIncome === 0) { toast('请至少填写主动收入或被动收入', 'error'); return false; }
  // 储蓄率异常高提示
  const savingsRate = totalIncome > 0 ? (totalIncome - totalExp) / totalIncome : 0;
  if (savingsRate > 0.7) {
    if (!confirm('储蓄率超过70%，请确认数据是否正确？\n（如数据无误可点击确定继续）')) return false;
  }
  // 债务比异常提示
  const debtRatio = totalIncome > 0 ? g('s-debt') / totalIncome : 0;
  if (debtRatio > 0.6) {
    if (!confirm('债务占收入比超过60%，风险较高。\n请确认数据是否正确？\n（如数据无误可点击确定继续）')) return false;
  }
  return true;
}

// ── 输入实时验证提示 ──
function checkIncome(el) {
  const val = parseFloat(el.value) || 0;
  const age = parseInt(v('s-age')) || 45;
  removeValHint(el);
  if (val === 0 && age > 40) {
    showValHint(el, '⚠️ 40+人群建议关注被动收入规划');
  }
}
function checkPassive(el) {
  const passive = parseFloat(el.value) || 0;
  const totalIncome = g('s-active') + passive;
  removeValHint(el);
  if (passive === 0 && totalIncome > 0) {
    showValHint(el, '💡 建议配置储蓄险/ETF建立被动收入');
  }
}
function showValHint(el, msg) {
  const parent = el.closest('.fg') || el.parentElement.parentElement;
  let hint = parent.querySelector('.val-hint');
  if (!hint) {
    hint = document.createElement('div');
    hint.className = 'val-hint';
    hint.style.cssText = 'font-size:11px;color:var(--gold);margin-top:4px;padding:4px 8px;background:rgba(201,168,76,0.08);border-radius:6px;';
    parent.appendChild(hint);
  }
  hint.textContent = msg;
}
function removeValHint(el) {
  const parent = el.closest('.fg') || el.parentElement.parentElement;
  const hint = parent.querySelector('.val-hint');
  if (hint) hint.remove();
}


function collectData() {
  const data = {
    id: currentClientId, // 保持原有ID以更新记录
    name: v('s-name').trim(),
    age: parseInt(v('s-age')) || 45,
    retireAge: parseInt(v('s-retire')) || 60,
    riskPref: v('s-risk'),
    currency: v('s-currency'),
    emergencyMonths: parseInt(v('s-emonths')) || 6,
    cash: g('s-cash'),
    savingsPlan: g('s-savings-plan'),
    trust: g('s-trust'),
    property: g('s-property'),
    stocks: g('s-stocks'),
    gold: g('s-gold'),
    other: 0,
    activeIncome: g('s-active'),
    passiveIncome: g('s-passive'),
    essentialExp: g('s-essential'),
    flexExp: g('s-flex'),
    premiumExp: g('s-premium'),
    debtExp: g('s-debt'),
    retireNeed: g('s-retire-need'),
    eduGoal: g('s-edu-goal'),
    eduYears: parseInt(v('s-edu-years')) || 8,
    legacyWish: v('s-legacy'),
  };
  return data;
}

// ── 手动保存当前数据 ───────────────────────────
function saveCurrentData() {
  try {
    const raw = collectData();
    if (!raw.name) {
      toast('请先填写姓名', 'error');
      return false;
    }

    const derived = deriveData(raw);
    const clientId = saveClientData(raw, derived);

    if (clientId) {
      currentClientId = clientId;
      toast('数据已保存');
      return true;
    }
    return false;
  } catch (error) {
    console.error('保存失败:', error);
    toast('保存失败', 'error');
    return false;
  }
}

// ── 自动保存当前数据 ───────────────────────────
function autoSaveCurrentData() {
  const raw = collectData();
  if (!raw.name) return;

  const derived = deriveData(raw);
  const clientId = saveClientData(raw, derived);

  if (clientId) {
    currentClientId = clientId;
  }
}

// ── 加载客户数据到表单 ─────────────────────────
function loadClientToForm(clientId) {
  try {
    const client = loadClientData(clientId);
    if (!client) {
      toast('未找到客户档案', 'error');
      return false;
    }

    const data = client.raw;
    currentClientId = clientId;

    // 填充基本信息
    el('s-name').value = data.name || '';
    el('s-age').value = data.age || '';
    el('s-retire').value = data.retireAge || 60;
    el('s-risk').value = data.riskPref || 'moderate';
    el('s-currency').value = data.currency || 'USD';
    el('s-emonths').value = data.emergencyMonths || 6;

    // 填充资产情况
    el('s-cash').value = data.cash || '';
    el('s-savings-plan').value = data.savingsPlan || '';
    el('s-trust').value = data.trust || '';
    el('s-property').value = data.property || '';
    el('s-stocks').value = data.stocks || '';
    el('s-gold').value = data.gold || '';

    // 填充收支数据
    el('s-active').value = data.activeIncome || '';
    el('s-passive').value = data.passiveIncome || '';
    el('s-essential').value = data.essentialExp || '';
    el('s-flex').value = data.flexExp || '';
    el('s-premium').value = data.premiumExp || '';
    el('s-debt').value = data.debtExp || '';

    // 填充目标规划
    el('s-retire-need').value = data.retireNeed || '';
    el('s-edu-goal').value = data.eduGoal || '';
    el('s-edu-years').value = data.eduYears || 8;
    el('s-legacy').value = data.legacyWish || 'none';

    toast(`已加载客户档案：${data.name}`);
    return true;
  } catch (error) {
    console.error('加载失败:', error);
    toast('加载失败', 'error');
    return false;
  }
}

// ── 生成报告 ──
function generateReport() {
  if (!validateStep1()) return;
  if (!validateStep2()) return;
  const raw = collectData();
  reportData = deriveData(raw);

  // 检查是否启用姓名合并模式
  // 如果是新客户（没有 ID），则尝试查找同名客户
  const mergeByName = !currentClientId;
  const existingClient = mergeByName ? findClientByName(raw.name) : null;

  if (existingClient && !currentClientId) {
    // 找到同名客户，询问用户是否更新
    if (confirm(`检测到已存在同名客户「${raw.name}」。\n\n是否更新该客户的档案？\n\n点击"确定"更新现有档案，点击"取消"创建新档案。`)) {
      raw.id = existingClient.id; // 使用现有客户的 ID
    }
    // 如果点击取消，不设置 ID，将创建新档案
  }

  // 自动保存数据
  const clientId = saveClientData(raw, reportData, true);
  if (clientId) {
    currentClientId = clientId;
  }

  renderReport(raw, reportData);
  goStep(3);
}

// ── 渲染报告 ──
function renderReport(raw, d) {
  const c = d.currency;
  const riskLabel = { conservative: '保守型', moderate: '稳健型', growth: '成长型', aggressive: '激进型' };
  const riskModelInfo = {
    conservative: {
      title: '保守型防御模型（基于 Harry Browne 永久组合改良）',
      desc: '适合55岁以上或风险厌恶型投资者。核心逻辑：现金15% + 储蓄保险30% + 信托10% + 房产10% + 股票15% + 黄金10% + 债券10%。强调本金安全与稳定现金流，降低权益类资产波动。'
    },
    moderate: {
      title: '稳健型全天候模型（基于达利欧风险平价理念）',
      desc: '适合追求长期稳定回报的投资者。核心逻辑：现金10% + 储蓄保险25% + 信托10% + 房产10% + 股票25% + 黄金10% + 债券10%。通过多资产类别分散风险，让不同资产在经济周期各阶段发挥对冲作用。'
    },
    growth: {
      title: '成长型本分模型（基于段永平价值投资理念）',
      desc: '适合有一定研究能力、追求超额收益的投资者。核心逻辑：现金8% + 储蓄保险20% + 信托12% + 房产10% + 股票35% + 黄金5% + 债券10%。强调能力圈内集中投资，安全边际，长期持有优质资产。'
    },
    aggressive: {
      title: '激进型增长模型',
      desc: '适合年轻投资者或高风险承受能力者。核心逻辑：现金5% + 储蓄保险15% + 信托10% + 房产10% + 股票45% + 黄金5% + 债券10%。高权益配置追求资本增值，需承受较大波动，建议配合长期持有策略。'
    }
  };
  const riskModel = riskModelInfo[d.riskPref] || riskModelInfo.moderate;
  const riskModelTitle = riskModel.title;
  const riskModelDesc = riskModel.desc;
  const now = new Date();
  const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

  const benchmarks = getBenchmarks(d.age || 40, d.totalIncome || 0);
  const advices = genAdvices(d);
  const enhancedAdvices = genEnhancedAdvices(d);
  const allocAnalysis = calcAllocationDrift(d);
  const rebalanceAdvices = genRebalanceAdvice(allocAnalysis.drift, d.totalAssets, d.currency);
  const actionPlan = genActionPlan(d);

  // 资产配置 - 当前 vs 目标
  const allocItems = [
    { key: 'cash', name: '流动现金', val: d.cash, color: '#4d8fff' },
    { key: 'savingsPlan', name: '储蓄保险', val: d.savingsPlan, color: '#3ecf8e' },
    { key: 'trust', name: '信托资产', val: d.trust, color: '#8b5cf6' },
    { key: 'property', name: '投资房产', val: d.property, color: '#f59e0b' },
    { key: 'stocks', name: '股票基金', val: d.stocks, color: '#e05555' },
    { key: 'gold', name: '黄金储备', val: d.gold, color: '#c9a84c' },

            <div style="font-size:12px;color:#555555;margin-bottom:6px;">黄金储备 ${fmt(d.retireEst.gold, c)}</div>
            <div style="font-size:12px;color:#555555;margin-bottom:6px;">新增储蓄 ${fmt(d.retireEst.newSavings, c)}</div>
            ${d.trust > 0 ? `<div style="font-size:12px;color:#555555;margin-bottom:6px;">信托资产 ${fmt(d.retireEst.trust, c)}</div>` : ''}
            <div style="border-top:1px solid #e0e0e0;margin:12px 0;"></div>
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;">
              <span>预估资产合计</span><span style="color:#c9a84c;">${fmt(d.retireEst.total, c)}</span>
            </div>
            <div style="font-size:11px;color:#888888;margin-top:4px;">4% 规则月提取 ≈ ${fmt(d.retireEst.monthly4pct, c)}</div>
          </div>
        </div>
      </div>
    `;
  }

  // 教育规划（如果有数据）
  if (d.eduGoal > 0) {
    pdfHTML += `
      <div style="background:#ffffff;border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:25px;">
        <div style="font-size:14px;font-weight:600;color:#c9a84c;margin-bottom:15px;">🎓 子女教育储备</div>
        <div style="display:flex;gap:30px;">
          <div style="flex:1;">
            <div style="font-size:12px;color:#666666;margin-bottom:8px;">教育目标</div>
            <div style="font-size:18px;font-weight:700;color:#2b6cb0;margin-bottom:4px;">${fmt(d.eduGoal, c)}</div>
            <div style="font-size:12px;color:#888888;">${d.eduYears} 年准备期</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:12px;color:#666666;margin-bottom:8px;">建议月供</div>
            <div style="font-size:18px;font-weight:700;color:#2b6cb0;margin-bottom:4px;">${fmt(d.eduMonthly, c)} <span style="font-size:12px;color:#888888;">/ 月</span></div>
            <div style="font-size:12px;color:#888888;">月结余占比 ${d.monthlySurplus > 0 ? ((d.eduMonthly / d.monthlySurplus) * 100).toFixed(1) + '%' : 'N/A'}</div>
          </div>
        </div>
      </div>
    `;
  }

  // 优化建议（PDF版）
  pdfHTML += `
      <div style="background:#ffffff;border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:25px;">
        <div style="font-size:14px;font-weight:600;color:#c9a84c;margin-bottom:15px;">💡 优化建议（按优先级排列）</div>
        ${enhancedAdvices.filter(a => a.priority !== 'good').slice(0, 5).map(a => `
          <div style="background:${a.priority === 'critical' ? '#fdf8f8' : '#fdfbf5'};border:1px solid ${a.priority === 'critical' ? '#f5d6d6' : '#f0e6d2'};border-radius:10px;padding:14px;margin-bottom:12px;">
            <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#333333;margin-bottom:6px;">
              <span style="background:${a.priority === 'critical' ? '#c44536' : '#c9a84c'};color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;">${a.priority === 'critical' ? '紧急' : '重要'}</span>
              ${a.icon} ${a.title}
            </div>
            <div style="font-size:12px;color:#555555;line-height:1.7;margin-bottom:6px;">${a.problem}</div>
            ${a.target ? `<div style="font-size:12px;color:#2d8a5e;font-weight:600;margin-bottom:4px;">目标：${a.target}</div>` : ''}
            ${a.solutions.length > 0 ? `<div style="font-size:11px;color:#888888;">推荐：${a.solutions.map(s => `${s.name}（${s.yield}）`).join(' / ')}</div>` : ''}
            <div style="font-size:11px;color:#888888;margin-top:4px;">时间：${a.timeline}</div>
          </div>
        `).join('')}
      </div>

      <!-- 免责声明 -->
      <div style="text-align:center;font-size:10px;color:#999999;padding:20px 0;border-top:1px solid #e0e0e0;">
        本报告由现金流规划助手自动生成，仅供参考，不构成投资建议。<br>
        所有数据仅在您的浏览器中处理，不会上传至任何服务器。<br>
        生成日期：${dateStr}
      </div>
    </div>
  `;

  // 创建临时容器
  const pdfContainer = document.createElement('div');
  pdfContainer.innerHTML = pdfHTML;
  pdfContainer.style.cssText = `
    position: fixed;
    left: -9999px;
    top: 0;
    width: 800px;
    background: #ffffff;
    padding: 30px;
  `;

  document.body.appendChild(pdfContainer);

  html2pdf().set({
    margin: [10, 10, 10, 10],
    filename: fileName,
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  }).from(pdfContainer).save().then(() => {
    // 清理
    if (btns) btns.style.display = origDisplay;
    pdfContainer.remove();
    toast('PDF 报告已生成');
  }).catch((err) => {
    console.error('PDF error:', err);
    if (btns) btns.style.display = origDisplay;
    pdfContainer.remove();
    toast('PDF 生成失败，请重试', 'error');
  });
}
</script>
</body>
</html>
